<svg width="1142" height="1775" viewBox="0 0 1142 1775" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .frame { fill: #fbfaf8; stroke: #2d314a; stroke-width: 3; }
