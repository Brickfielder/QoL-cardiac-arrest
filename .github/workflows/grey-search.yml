name: Grey search pipeline

on:
  workflow_dispatch:

jobs:
  run-grey-search:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run grey search package
        run: python -m grey_search.run

      - name: Commit and push grey search outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/raw/grey-literature/*.jsonl data/processed/grey-literature/grey_candidates_deduped.ris data/normalized/grey-literature.csv logs/search_log.jsonl
          if git diff --cached --quiet; then
            echo "No grey search output changes to commit"
            exit 0
          fi
          git commit -m "chore(data): update grey search outputs"
          git push

      - name: Upload grey search outputs
        uses: actions/upload-artifact@v4
        with:
          name: grey-search-${{ github.run_id }}
          path: |
            data/raw/grey-literature/*.jsonl
            data/processed/grey-literature/grey_candidates_deduped.ris
            data/normalized/grey-literature.csv
            logs/search_log.jsonl
          if-no-files-found: error
          retention-days: 14
